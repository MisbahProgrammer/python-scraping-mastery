<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans p-10 flex items-center justify-center min-h-screen">

    <div class="bg-gray-800 p-8 rounded-xl border border-gray-700 w-full max-w-lg">
        <h2 class="text-2xl font-bold mb-6 text-yellow-400">✏️ Edit Project #{{ project[0] }}</h2>
        
        <form action="/edit/{{ project[0] }}" method="POST" class="flex flex-col gap-5">
            <div>
                <label class="block text-gray-400 mb-1 text-sm">Project Title</label>
                <input type="text" name="title" value="{{ project[1] }}" required 
                       class="w-full bg-gray-900 border border-gray-600 rounded px-4 py-2 text-white focus:outline-none focus:border-yellow-500">
            </div>
            
            <div>
                <label class="block text-gray-400 mb-1 text-sm">Language</label>
                <input type="text" name="language" value="{{ project[2] }}" required 
                       class="w-full bg-gray-900 border border-gray-600 rounded px-4 py-2 text-white focus:outline-none focus:border-yellow-500">
            </div>
            
            <div class="flex gap-4 mt-4">
                <button type="submit" class="bg-yellow-600 hover:bg-yellow-700 text-white px-6 py-2 rounded font-semibold transition flex-1">
                    Save Changes
                </button>
                <a href="/projects" class="bg-gray-600 hover:bg-gray-500 text-white px-6 py-2 rounded font-semibold transition text-center flex-1">
                    Cancel
                </a>
            </div>
        </form>
    </div>

</body>
</html>
