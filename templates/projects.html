<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misbah's Projects</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans p-10">

    <div class="max-w-4xl mx-auto">
        <h1 class="text-4xl font-bold text-center mb-10 text-blue-400">🚀 My Code Portfolio</h1>

        <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 mb-10">
            <h2 class="text-xl font-semibold mb-4 text-green-400">➕ Add New Project</h2>
            
            <form action="/add_project_web" method="POST" class="flex flex-col md:flex-row gap-4">
                <input type="text" name="title" placeholder="Project Title (e.g., IT Automation Script)" required 
                       class="flex-1 bg-gray-900 border border-gray-600 rounded px-4 py-2 text-white focus:outline-none focus:border-blue-500">
                
                <input type="text" name="language" placeholder="Language (e.g., Python)" required 
                       class="w-full md:w-1/3 bg-gray-900 border border-gray-600 rounded px-4 py-2 text-white focus:outline-none focus:border-blue-500">
                
                <button type="submit" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded font-semibold transition">
                    Save to Database
                </button>
            </form>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            {% for project in projects %}
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 flex flex-col justify-between">
                <div>
                    <div class="flex justify-between items-start mb-2">
                        <h2 class="text-2xl font-semibold">{{ project[1] }}</h2>
                        <span class="bg-blue-900 text-blue-300 py-1 px-3 rounded-full text-xs">
                            {{ project[2] }}
                        </span>
                    </div>
                    <p class="text-gray-500 text-sm mb-4">Project ID: #{{ project[0] }}</p>
                </div>
                
                <form action="/delete/{{ project[0] }}" method="POST" onsubmit="return confirm('Are you sure you want to delete this project?');">
                    <button type="submit" class="bg-red-600 hover:bg-red-700 text-white px-3 py-1.5 rounded text-sm w-full transition font-semibold">
                        🗑️ Delete Project
                    </button>
                </form>
            </div>
            {% endfor %}
        </div>

        {% if not projects %}
        <div class="text-center text-gray-500 mt-10 p-6 bg-gray-800 rounded-xl border border-gray-700">
            <p>No projects found. Add one above!</p>
        </div>
        {% endif %}
    </div>

</body>
</html>
